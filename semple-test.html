<!DOCTYPE html>
<html>
<head>
    <title>Простой тест API</title>
</head>
<body>
    <h1>Простой тест API</h1>
    
    <div style="margin-bottom: 20px;">
        <button onclick="testDoctors()">1. Получить врачей (GET)</button>
        <button onclick="testImport()">2. Импорт данных (POST)</button>
    </div>
    
    <div style="margin-bottom: 20px;">
        <h3>Результат:</h3>
        <pre id="result" style="background: #f0f0f0; padding: 10px; min-height: 100px;">Нажми кнопку</pre>
    </div>

    <script>
    // Функция для теста GET /doctors
    async function testDoctors() {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = 'Загрузка...';
        
        try {
            const response = await fetch('http://localhost:3000/doctors');
            const text = await response.text(); // Сначала получаем как текст
            
            resultDiv.textContent = 'Статус: ' + response.status + '\n\n';
            
            try {
                // Пробуем распарсить как JSON
                const data = JSON.parse(text);
                resultDiv.textContent += 'Данные: ' + JSON.stringify(data, null, 2);
            } catch {
                // Если не JSON, показываем как есть
                resultDiv.textContent += 'Ответ (не JSON):\n' + text;
            }
        } catch (error) {
            resultDiv.textContent = 'Ошибка: ' + error.message;
        }
    }

    // Функция для теста POST /import
    async function testImport() {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = 'Загрузка...';
        
        try {
            const response = await fetch('http://localhost:3000/import', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            
            const text = await response.text();
            
            resultDiv.textContent = 'Статус: ' + response.status + '\n\n';
            
            try {
                const data = JSON.parse(text);
                resultDiv.textContent += 'Данные: ' + JSON.stringify(data, null, 2);
            } catch {
                resultDiv.textContent += 'Ответ (не JSON):\n' + text;
            }
        } catch (error) {
            resultDiv.textContent = 'Ошибка: ' + error.message;
        }
    }
    </script>
</body>
</html>
