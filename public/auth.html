<!DOCTYPE html>
<html>

<head>
    <title>Вход для пациентов</title>
</head>

<body>
    <h1>🏥 Вход в систему записи</h1>

    <div style="border:1px solid #ccc; padding:20px; max-width:400px;">
        <h3>Вход</h3>
        <input type="text" id="loginInput" placeholder="Код пациента или Email"><br>
        <input type="password" id="loginPassword" placeholder="Пароль"><br>
        <button onclick="login()">Войти</button>
    </div>

    <div style="border:1px solid #ccc; padding:20px; max-width:400px; margin-top:20px;">
        <h3>Регистрация</h3>
        <input type="text" id="regName" placeholder="Полное имя"><br>
        <input type="email" id="regEmail" placeholder="Email"><br>
        <input type="password" id="regPassword" placeholder="Пароль"><br>
        <button onclick="register()">Зарегистрироваться</button>
    </div>

    <div id="message" style="margin-top:20px;"></div>

    <script>
        //const crypto = require('crypto');
        async function register() {
            const data = {
                patient_id: crypto.randomUUID(),
                patient_full_name: document.getElementById('regName').value,
                patient_mail: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const msg = document.getElementById('message');

            if (response.ok) {
                msg.innerHTML = '✅ Регистрация успешна, можно войти';
                msg.style.color = 'green';
            } else {
                msg.innerHTML = '❌ ' + result.error;
                msg.style.color = 'red';
            }
        }

        async function login() {
            const data = {
                login: document.getElementById('loginInput').value,
                password: document.getElementById('loginPassword').value
            };

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                console.log('Сохраняем в localStorage:', result.patient_id, result.patient_full_name);

                localStorage.setItem('patientId', result.patient_id);
                localStorage.setItem('patientName', result.patient_full_name);

                console.log('Проверка:', localStorage.getItem('patientId'));

                window.location.href = '/test.html';
            } else {
                document.getElementById('message').innerHTML = '❌ ' + result.error;
                document.getElementById('message').style.color = 'red';
            }
        }
    </script>
</body>

</html>
