<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход / Регистрация</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        input { padding: 8px; margin: 5px; width: 100%; box-sizing: border-box; }
        button { padding: 8px 15px; margin-top: 10px; cursor: pointer; }
        .msg { margin-top: 10px; padding: 10px; }
    </style>
</head>
<body>
<div class="section">
    <h3>📥 0. Импорт CSV</h3>
    <button onclick="testImport()">Импортировать все данные</button>
</div>

<h1>🏥 Вход / Регистрация</h1>

<div class="form">
    <h3>🔐 Вход</h3>
    <input type="email" id="loginEmail" placeholder="Email" value="patient001@mail.ru">
    <input type="password" id="loginPassword" placeholder="Пароль" value="123">
    <button onclick="login()">Войти</button>
</div>

<div class="form">
    <h3>📝 Регистрация (только пациент)</h3>
    <input type="text" id="regName" placeholder="ФИО">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Пароль (мин. 3 символа)">
    <button onclick="register()">Зарегистрироваться</button>
</div>

<div id="message" class="msg"></div>

<script>
    async function testImport() {
        try {
            const res = await fetch('/import', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            const text = await res.text();
            showMessage(text, 'green');
        } catch(e) { 
            showMessage('Ошибка: '+e.message, 'red'); 
        }
    }

    async function register() {
        const fio = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!fio || !email || !password) {
            showMessage('Заполните все поля', 'red');
            return;
        }
        try {
            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fio, email, password })
            });
            const data = await res.json();
            if (res.ok) {
                showMessage('✅ Регистрация успешна! Теперь войдите.', 'green');
                // очистить поля
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
            } else {
                showMessage('❌ ' + (data.error || 'Ошибка'), 'red');
            }
        } catch(e) { showMessage('Ошибка: '+e.message, 'red'); }
    }

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) {
            showMessage('Введите email и пароль', 'red');
            return;
        }
        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('id', data.id);
                localStorage.setItem('name', data.name);
                localStorage.setItem('role', data.role);
                showMessage(`✅ Вход выполнен. Привет, ${data.name}! Перенаправление...`, 'green');
                setTimeout(() => { window.location.href = '/test.html'; }, 1000);
            } else {
                showMessage('❌ ' + (data.error || 'Неверный email или пароль'), 'red');
            }
        } catch(e) { showMessage('Ошибка: '+e.message, 'red'); }
    }

    function showMessage(msg, color) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerHTML = msg;
        msgDiv.style.color = color;
        msgDiv.style.background = '#f9f9f9';
        msgDiv.style.padding = '10px';
        msgDiv.style.border = '1px solid ' + color;
    }
</script>
</body>
</html>
