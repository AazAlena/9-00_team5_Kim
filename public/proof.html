<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="proof_style.css">
    <title>Подтверждение записи на приём</title>
</head>

<body>
    <div class="main">
        <div class="sec proof">
            <div class="proof-text">Внимательно проверьте <br> данные и подтвердите запись</div>
            <button class="proof-button">Подтвердить</button>
        </div>
        <div class="sec data">
            <div class="data-content">
                Ф.И.О.:<p>Иванов Иван<br>Иванович</p><br>
                Специальность:<p>Врач</p><br>
                Дата и время:<p>10.10.10 10:10</p>
            </div>
        </div>
    </div>
    <div class="return">
        <a href="#">Вернуться к выбору</a>
    </div>
    <script src="./proof_app.js"></script>
</body>
</html>
