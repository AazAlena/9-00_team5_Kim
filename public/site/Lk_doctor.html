<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Lk_doctor_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
    <title>Личный кабинет врача</title>
</head>
<body>
    <section id="nav">
        <button type="button" id="nav_butt"></button>
        <div id="nav_fill">
            <button type="button" id="main_butt">
                Главная
            </button>
            <button type="button" id="Esc_butt">
                Выйти из<br> аккаунта
            </button>
        </div>
    </section>
    <section id="bg">
        <section class="sec first">
            <label for="month">Выберите месяц</label>
            <select name="month" id="month">
                <option value="1">Январь</option>
                <option value="2">Февраль</option>
                <option value="3">Март</option>
                <option value="4">Апрель</option>
                <option value="5">Май</option>
                <option value="6">Июнь</option>
                <option value="7">Июль</option>
                <option value="8">Август</option>
                <option value="9">Сентябрь</option>
                <option value="10">Октябрь</option>
                <option value="11">Ноябрь</option>
                <option value="12">Декабрь</option>
            </select>
            <section id="calendar"></section>
        </section>
        <section class="sec second">
            <h1>Записи на этот день</h1>
            <hr>
            <div class="appointments"></div>
        </section>
    </section>
    <script src="./Lk_doctor_app.js"></script>
</body>
</html>
