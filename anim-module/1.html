<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./1.css">
</head>
<body>
    <header>
        <nav>
            <div class="navigation">
                <div>Наши врачи</div>
                <div>Статистика</div>

                <div>Контакты</div>
            </div>

        </nav>
    </header>
    <main>
        <section class="aboutClinic">
            <div class="h1 _anim-items">Самая лучшая клиника на свете</div>
            <div class="clinicImage _anim-items _anim-no-hide">
                <img src="./image/clinic.jpg" alt="Здание нашей клиники">
            </div>
        </section>
        <section class="visitClinic">
            <button class="doctorAppointmentButton">Запись к врачу</button>
            <button class="doctorAppointmentButton">Запись по дате</button>
        </section>
        <section>
            <div class="h2 _anim-items">Наши врачи</div>
        </section>
        <section style="padding-top: 1000px;"></section>
    </main>
    <script src="./anim.js"></script>

</html>
